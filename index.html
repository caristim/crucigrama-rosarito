<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crucigramas PWA</title>
  
  <!-- Enlace de estilos unificado y con rompe-cachés -->
  <link rel="stylesheet" href="styles.css?v=2" />
  
  <!-- Manifiesto de la PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  
  <!-- Configuración básica para dispositivos iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0b1220" />
</head>
<body>

  <!-- Barra superior con controles de selección -->
  <header class="topbar">
    <div class="brand">Crucigramas ES</div>
    <div class="controls">
      <span class="label">Crucigrama:</span>
      <select id="cwSelect" class="select">
        <option value="">Cargando...</option>
      </select>
    </div>
  </header>

  <!-- Layout Principal de la Aplicación -->
  <main class="layout">
    
    <!-- Zona del Tablero y Controles de Estado -->
    <section class="boardWrap">
      <!-- Mensaje informativo sobre la casilla y dirección actual -->
      <div class="hintRow">
        <div class="activeInfo">
          <span class="k">Dirección:</span><span id="dirText" style="font-weight:700; color:var(--accent2);">—</span>
          <span class="k" style="margin-left:12px;">Pista:</span><span id="entryText" style="font-weight:700;">—</span>
        </div>
        <div class="buttons">
          <button id="checkBtn" class="btn">Comprobar</button>
          <button id="clearBtn" class="btn secondary">Limpiar todo</button>
        </div>
      </div>

      <!-- Cuadrícula del Tablero (Se genera dinámicamente) -->
      <div id="board" class="board"></div>
    </section>

    <!-- Barra lateral con el listado de pistas -->
    <aside class="side">
      <div class="panel">
        <h2>Pistas del Juego</h2>
        <div class="clues">
          <div>
            <div class="clueTitle">Horizontales</div>
            <div id="cluesAcross" class="clueList"></div>
          </div>
          <div>
            <div class="clueTitle">Verticales</div>
            <div id="cluesDown" class="clueList"></div>
          </div>
        </div>
      </div>
    </aside>

  </main>

  <!-- Pie de página informativo -->
  <footer class="footer">
    <p>Crucigramas PWA - Optimizado para PC y Smartphones</p>
  </footer>

  <!-- Registro del Service Worker (Opcional si deseas mantenerlo en background) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registrado con éxito'))
          .catch(err => console.error('Error al registrar el SW:', err));
      });
    }
  </script>

  <!-- Importación de la lógica con el parámetro rompe-cachés v=2 -->
  <script src="app.js?v=2"></script>

</body>
</html>
